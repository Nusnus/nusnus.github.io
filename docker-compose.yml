services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - '4321:4321'
      - '24678:24678'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.astro
    environment:
      - NODE_ENV=development
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    working_dir: /app
    command: bun run dev --host 0.0.0.0
