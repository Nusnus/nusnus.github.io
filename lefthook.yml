pre-commit:
  parallel: true
  jobs:
    - name: lockfile
      run: bun install --frozen-lockfile

    - name: lint
      run: bun run lint

    - name: format
      run: bun run format:check

    - name: type-check
      run: bun run type-check

    - name: validate-data
      run: bun run validate-data
